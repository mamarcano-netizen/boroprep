<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoroPrep — Reference Sheets</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .ref-header { padding: 24px 0 16px; }
    .ref-header h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 4px; }
    .ref-header p { color: var(--muted); margin: 0; }
    .ref-section { margin-bottom: 20px; }
    .ref-section h2 { font-size: 1rem; font-weight: 700; margin-bottom: 10px; color: var(--primary); }
    .ref-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin-bottom: 4px; }
    .ref-table th { text-align: left; padding: 6px 10px; background: #f1f5f9; font-weight: 700; border-bottom: 2px solid var(--border); }
    .ref-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .ref-table tr:last-child td { border-bottom: none; }
    .ref-ul { margin: 0; padding-left: 20px; font-size: 0.88rem; line-height: 1.8; }
    .ref-formula { font-family: monospace; background: #f8fafc; border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; margin: 4px 0; font-size: 0.9rem; display: inline-block; }
    .formula-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .element-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; text-align: center; font-size: 0.78rem; }
    .element-card .el-sym { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
    .element-card .el-name { color: var(--text); font-weight: 600; }
    .element-card .el-num { color: var(--muted); font-size: 0.72rem; }
    .element-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }
    .subject-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .subject-tab { padding: 8px 16px; border: 2px solid var(--border); border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 0.85rem; background: white; transition: all 0.2s; }
    .subject-tab:hover { border-color: var(--primary); color: var(--primary); }
    .subject-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    body.dark .subject-tab { background: #1e293b; color: #f1f5f9; }
    body.dark .subject-tab.active { background: var(--primary); color: white; }
    body.dark .element-card { background: #1e293b; border-color: #334155; }
    body.dark .ref-table th { background: #0f172a; border-color: #334155; }
    body.dark .ref-table td { border-color: #1e293b; }
    body.dark .ref-formula { background: #1e293b; border-color: #334155; color: #f1f5f9; }
    .activity-list { list-style: none; padding: 0; margin: 0; font-size: 0.88rem; }
    .activity-list li { padding: 3px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
    .activity-list li:last-child { border-bottom: none; }
    .activity-most { color: var(--success); font-weight: 700; font-size: 0.75rem; }
    .activity-least { color: var(--danger); font-weight: 700; font-size: 0.75rem; }
    @media print {
      .sidebar, .navbar, .mobile-bottom-nav, .no-print { display: none !important; }
      .desktop-main { margin-left: 0 !important; }
      body { background: white !important; color: black !important; font-size: 11pt; }
      .card { border: 1px solid #ccc !important; box-shadow: none !important; break-inside: avoid; }
      a { color: black !important; text-decoration: none !important; }
      .print-btn { display: none !important; }
    }
  </style>
</head>

    const SUBJECTS = [
      { id: "chemistry",   label: "⚗️ Chemistry" },
      { id: "algebra1",    label: "📐 Algebra I" },
      { id: "geometry",    label: "📏 Geometry" },
      { id: "physics",     label: "⚡ Physics" },
      { id: "biology",     label: "🧬 Living Env." },
      { id: "earthscience",label: "🌍 Earth Science" },
    ];

    function renderRef(subjectId) {
      const ref = REFS[subjectId];
      if (!ref) {
        document.getElementById("ref-content").innerHTML = `<div class="card" style="padding:24px;text-align:center;color:var(--muted)">No reference sheet available yet for this subject.</div>`;
        document.getElementById("ref-title").textContent = "📚 Reference Sheets";
        document.getElementById("ref-subtitle").textContent = "Quick facts and formulas for your Regents exam";
        return;
      }
      document.getElementById("ref-title").textContent = `${ref.emoji} ${ref.name} Reference Sheet`;
      document.getElementById("ref-subtitle").textContent = "Quick-access facts and formulas — open this during study sessions";
      document.title = `BoroPrep — ${ref.name} Reference`;

      document.getElementById("ref-content").innerHTML = ref.sections.map(sec => `
        <div class="card ref-section" style="padding:18px 20px">
          <h2>${sec.title}</h2>
          ${sec.html}
        </div>
      `).join("");
    }

    // Build subject tabs
    const tabsEl = document.getElementById("subject-tabs");
    tabsEl.innerHTML = SUBJECTS.map(s =>
      `<button class="subject-tab" data-id="${s.id}">${s.label}</button>`
    ).join("");

    tabsEl.querySelectorAll(".subject-tab").forEach(btn => {
      btn.addEventListener("click", () => {
        tabsEl.querySelectorAll(".subject-tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const newUrl = `/reference?subject=${btn.dataset.id}`;
        history.replaceState(null, "", newUrl);
        renderRef(btn.dataset.id);
      });
    });

    // Read URL param and load
    const params = new URLSearchParams(location.search);
    const subjectParam = params.get("subject") || "chemistry";
    const activeTab = tabsEl.querySelector(`[data-id="${subjectParam}"]`);
    if (activeTab) activeTab.classList.add("active");
    renderRef(subjectParam);
  </script>
