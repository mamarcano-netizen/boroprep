<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoroPrep — My Score</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body {
      min-height: 100vh;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Inter, sans-serif;
    }

    .share-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* The card that gets screenshotted */
    #share-card {
      width: 100%;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border-radius: 24px;
      padding: 44px 32px;
      text-align: center;
      color: white;
      box-shadow: 0 20px 60px rgba(79,70,229,0.35);
      position: relative;
      overflow: hidden;
    }
    #share-card::before {
      content: "";
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    #share-card::after {
      content: "";
      position: absolute;
      bottom: -40px; left: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }

    .card-logo {
      font-size: 0.875rem;
      font-weight: 700;
      opacity: 0.8;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .card-name {
      font-size: 1.1rem;
      font-weight: 600;
      opacity: 0.9;
      margin-bottom: 8px;
    }
    .card-subject {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 24px;
      opacity: 0.95;
    }
    .card-score {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
      text-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }
    .card-score-label {
      font-size: 1rem;
      font-weight: 600;
      opacity: 0.8;
      margin-bottom: 28px;
    }
    .card-tagline {
      font-size: 1.05rem;
      font-weight: 700;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 20px;
      backdrop-filter: blur(4px);
    }

    /* Buttons */
    .share-btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .share-btns .btn {
      width: 100%;
      font-size: 1rem;
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
    }
    .btn-copy {
      background: white;
      color: var(--primary);
      border: 2px solid var(--primary);
    }
    .btn-copy:hover { background: #f0f0ff; }
    .btn-download {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      border: none;
      box-shadow: 0 4px 16px rgba(79,70,229,0.3);
    }
    .btn-download:hover { opacity: 0.92; transform: translateY(-1px); }

    .back-link {
      font-size: 0.875rem;
      color: var(--muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--primary); }

    #copy-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      transition: transform 0.3s ease;
      pointer-events: none;
      z-index: 999;
    }
    #copy-toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div class="share-wrap">

    <div id="share-card">
      <div class="card-logo">🗽 BoroPrep</div>
      <div class="card-name" id="card-name">Student</div>
      <div class="card-subject" id="card-subject">Regents Exam</div>
      <div class="card-score" id="card-score">--</div>
      <div class="card-score-label">Score</div>
      <div class="card-tagline">I'm passing my Regents! 🗽 BoroPrep.app</div>
    </div>

    <div class="share-btns">
      <button class="btn btn-copy" id="copy-btn">🔗 Copy Link</button>
      <button class="btn btn-download" id="download-btn">📥 Download as Image</button>
    </div>

    <a href="/study" class="back-link">← Back to studying</a>
  </div>

  <div id="copy-toast">Link copied! ✓</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const score   = params.get("score")   || "--";
    const subject = params.get("subject") || "Regents Exam";
    const name    = params.get("name")    || "Student";

    document.getElementById("card-name").textContent    = name + "'s Score";
    document.getElementById("card-subject").textContent = subject + " Regents";
    document.getElementById("card-score").textContent   = score + (String(score).includes("%") ? "" : "%");
    document.title = `${name} scored ${score} on ${subject} — BoroPrep`;

    // Copy link
    document.getElementById("copy-btn").addEventListener("click", () => {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const toast = document.getElementById("copy-toast");
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2500);
      });
    });

    // Download as image
    document.getElementById("download-btn").addEventListener("click", async () => {
      const btn = document.getElementById("download-btn");
      btn.textContent = "⏳ Generating...";
      btn.disabled = true;
      try {
        const canvas = await html2canvas(document.getElementById("share-card"), {
          scale: 2,
          useCORS: true,
          backgroundColor: null,
        });
        const link = document.createElement("a");
        link.download = `boroprep-${subject.toLowerCase().replace(/\s+/g,"-")}-${score}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      } finally {
        btn.textContent = "📥 Download as Image";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
